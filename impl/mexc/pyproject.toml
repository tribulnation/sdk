[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mexc-trading-sdk"
version = "1.0.3"
authors = [
  {name="Marcel Claramunt", email="marcel@tribulnation.com"}
]
description = "Tribulnation SDK implementation for MEXC."
dependencies = [
  "typed-mexc", "trading-sdk",
]
requires-python = ">=3.10"
readme = {file="README.md", content-type="text/markdown"}

[project.urls]
repo = "https://github.com/tribulnation/sdk.git"

[project.optional-dependencies]
export = [
  "openpyxl", "pandas"
]